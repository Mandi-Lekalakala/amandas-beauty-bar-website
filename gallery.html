<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Amanda's Beauty Bar</title>
    <link rel="stylesheet" href="src/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">
        <a class="brand-name" href="index.html">Amanda's Beauty Bar</a>

        <button class="hamburger" id="hamburger">

          <span></span>

          <div class="gallery-item">
            <img src="images/gallery-2.jpeg" alt="Beauty Bar work sample 2" />
          </div>
          <div class="gallery-item">
            <img src="images/gallery-3.jpeg" alt="Beauty Bar work sample 3" />

          <div class="gallery-item">
            <img src="images/gallery-11.jpeg" alt="Beauty Bar work sample 11" />
          </div>
          <div class="gallery-item">
            <img src="images/gallery-12.jpeg" alt="Beauty Bar work sample 12" />
          </div>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="container footer-inner">
        <small
          >© <span id="year"></span>. Amanda's Beauty Bar. All rights
          reserved.</small
        >
        <a href="#top">Back to top ↑</a>
      </div>
    </footer>

    <script src="src/script.js"></script>
  </body>
</html>
