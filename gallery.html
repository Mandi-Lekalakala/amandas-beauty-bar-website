<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link rel="stylesheet" href="src/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Header -->
    <header class="site-header">
      <div class="header-inner">
        <!-- Top Left Logo Name -->
        <a class="brand-name" href="index.html"> Amanda's Beauty Bar </a>

        <button class="hamburger" id="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <!-- Middle Navigation links -->
        <nav class="site-nav">
          <ul class="nav-list">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li>
              <a href="gallery.html">Gallery</a>
            </li>
            <li><a href="index.html#contact">Contact</a></li>
          </ul>
        </nav>

        <!-- Top Right Booking Btn -->
        <a class="top-right-btn" href="booking.html">Book Here</a>
      </div>
    </header>
    <!-- GALLERY -->
    <section class="gallery" id="gallery">
      <div class="gallery-container">
        <header class="gallery-header">
          <h2>Gallery</h2>
          <p class="section-subtitle">A few looks from our work.</p>
        </header>

        <div class="gallery-grid">
          <figure class="gallery-item">
            <img src="assets/gallery-1.jpg" alt="Beauty Bar work sample 1" />
          </figure>

          <figure class="gallery-item">
            <img src="assets/gallery-2.jpg" alt="Beauty Bar work sample 2" />
          </figure>

          <figure class="gallery-item">
            <img src="assets/gallery-3.jpg" alt="Beauty Bar work sample 3" />
          </figure>

          <figure class="gallery-item">
            <img src="assets/gallery-4.jpg" alt="Beauty Bar work sample 4" />
          </figure>

          <figure class="gallery-item">
            <img src="assets/gallery-5.jpg" alt="Beauty Bar work sample 5" />
          </figure>

          <figure class="gallery-item">
            <img src="assets/gallery-6.jpg" alt="Beauty Bar work sample 6" />
          </figure>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="container footer-inner">
        <small
          >© <span id="year"></span>Amanda's Beauty Bar. All rights
          reserved.</small
        >
        <a href="#top">Back to top ↑</a>
      </div>
    </footer>
  </body>
</html>
